<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>404 — Miguel Lozano</title>
    <link rel="icon" href="/favicon.ico" />
    <style>
        :root { --gradient: linear-gradient(131deg, #7e3f95 30%, #00aeef 130%); }
        * { box-sizing: border-box; margin: 0; }
        html, body { height: 100%; }
        body {
            background: var(--gradient);
            color: #fff;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .card { text-align: center; max-width: 800px; }
        .punch-stack {
            position: relative;
            display: inline-block;
            margin-bottom: 1.5rem;
        }
        .code {
            font-size: clamp(151px, 27.8vw, 263px);
            font-weight: 800;
            line-height: 0.9;
            letter-spacing: -0.05em;
        }
        .bitmoji {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-47%, -60%);
            width: clamp(175px, 30.5vw, 285px);
            height: auto;
            filter: drop-shadow(0 6px 12px rgba(20, 20, 20, 0.35)) drop-shadow(0 18px 36px rgba(20, 20, 20, 0.4));
        }
        .headline {
            font-size: clamp(22px, 5.2vw, 36px);
            font-weight: 500;
            line-height: 1.2;
            letter-spacing: -0.01em;
            white-space: nowrap;
            opacity: 0.95;
            margin-bottom: 1rem;
        }
        .lede {
            font-size: clamp(17px, 2.4vw, 20px);
            line-height: 1.5;
            opacity: 0.85;
            margin-bottom: 2.2rem;
        }
        .home-link {
            display: inline-block;
            color: #fff;
            background: rgba(217, 217, 217, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 0.4em;
            padding: 14px 32px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 500;
            transition: background 0.25s ease, border-color 0.25s ease;
        }
        .home-link:hover { background: rgba(217, 217, 217, 0.3); border-color: rgba(255, 255, 255, 0.8); }
    </style>
</head>
<body>
    <div class="card">
        <div class="punch-stack">
            <div class="code" aria-hidden="true">404</div>
            <img class="bitmoji" src="/bitmoji-punch-through.png" alt="" />
        </div>
        <div class="headline">Well, this is awkward.</div>
        <div class="lede">The page you're looking for either moved, never existed,<br />or just wanted a moment alone.</div>
        <a class="home-link" href="/">← Back to home</a>
    </div>
</body>
</html>
